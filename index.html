<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Fridge</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Times New Roman', Times, serif;
      background: #222;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       PASSWORD SCREEN
    ───────────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #login-box {
      background: #fff;
      padding: 28px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      font-family: 'Times New Roman', Times, serif;
    }

    #login-box h2 {
      margin-bottom: 8px;
      font-family: 'Times New Roman', Times, serif;
    }

    #login-box input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1em;
    }

    #login-box button {
      padding: 8px 20px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1em;
      cursor: pointer;
    }

    #err { color: red; margin-top: 8px; font-size: 0.9em; }

    /* ─────────────────────────────────────────────
       SCENE (kitchen + fridge)
    ───────────────────────────────────────────── */
    #scene {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Kitchen background photo */
    .kitchen-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─────────────────────────────────────────────
       FRIDGE
    ───────────────────────────────────────────── */
    .fridge-wrap {
      position: absolute;
      left: 50%;
      bottom: -3%;
      transform: translateX(-50%);
      width: min(70vw, 900px);
    }

    .fridge {
      width: 100%;
      display: block;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       ITEMS PINNED TO THE FRIDGE
    ───────────────────────────────────────────── */
    .item {
      position: absolute;
      text-decoration: none;
      color: #222;
      font-family: 'Times New Roman', Times, serif;
    }

    .magnet {
      position: absolute;
      left: 50%;
      top: -22px;
      transform: translateX(-50%);
      width: 58px;
      height: 58px;
      object-fit: contain;
      z-index: 3;
    }

    .css-magnet {
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      z-index: 3;
    }

    .polaroid {
      background: #fff;
      padding: 8px 8px 20px;
      border-radius: 3px;
      box-shadow: 0 12px 25px rgba(0,0,0,.28);
      transition: .25s;
    }

    .item:hover .polaroid {
      transform: translateY(-8px) rotate(-2deg);
      box-shadow: 0 18px 35px rgba(0,0,0,.35);
    }

    .preview {
      width: 150px;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .preview-placeholder {
      width: 150px;
      height: 150px;
      background: #eee;
      border: 2px dashed #bbb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #999;
      font-size: 12px;
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
    }

    .preview-placeholder .ph-icon { font-size: 28px; opacity: 0.5; }

    .caption {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
    }

    /* ─────────────────────────────────────────────
       NAV ITEM POSITIONS ON THE FRIDGE
       Adjust top/left % to move items around
    ───────────────────────────────────────────── */
    #art  { top: 18%; left: 24%; }
    #work { top: 14%; left: 58%; }
    #food { top: 49%; left: 46%; }

    /* ─────────────────────────────────────────────
       DECORATIVE MAGNETS (no link)
    ───────────────────────────────────────────── */
    .decor {
      position: absolute;
      width: 52px;
      pointer-events: none;
    }

    .decor-css {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      pointer-events: none;
    }

    #d1 { left: 9%;  top: 12%; }
    #d2 { right: 12%; top: 28%; }
    #d3 { left: 18%; bottom: 16%; }

  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       PASSWORD SCREEN
  ════════════════════════════════════════════ -->
  <div id="login-screen">
    <div id="login-box">
      <h2>Password Required</h2>
      <input id="pw" type="password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()">
      <button onclick="login()">Enter</button>
      <p id="err"></p>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════
       SCENE — revealed after correct password
  ════════════════════════════════════════════ -->
  <div id="scene">

    <!-- Kitchen background — swap for: <img class="kitchen-bg" src="images/kitchen.jpg" alt="kitchen"> -->
    <div class="kitchen-bg" style="background: linear-gradient(160deg, #d6cfc4 0%, #b0a898 100%);"></div>

    <div class="fridge-wrap">

      <!-- Fridge image — swap the div below for: <img class="fridge" src="images/fridge.jpg" alt="fridge"> -->
      <div class="fridge" style="
        height: 85vh;
        background: linear-gradient(170deg, #e8e8e8, #c8c8c8);
        border-radius: 18px 18px 8px 8px;
        border: 3px solid #aaa;
        box-shadow: 4px 0 18px rgba(0,0,0,0.3), -2px 0 8px rgba(0,0,0,0.1);
        position: relative;
      ">
        <div style="
          position: absolute; right: 14%; top: 12%;
          width: 12px; height: 80px;
          background: #bbb; border-radius: 6px;
          box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        "></div>
      </div>


      <!-- ───────────────────────────────────────
           NAV ITEM 1 — ART → art.html
      ─────────────────────────────────────────── -->
      <a id="art" class="item" href="art.html">

        <!-- Swap for: <img class="magnet" src="images/magnets/art.png" alt="magnet"> -->
        <div class="css-magnet"
             style="background: radial-gradient(circle at 35% 35%, #ffb3c6, #e0406a);"></div>

        <div class="polaroid">
          <!-- Swap for: <img class="preview" src="images/art-card.png" alt="Art"> -->
          <div class="preview-placeholder">
            <span class="ph-icon">🎨</span>
            <span>art-card.png</span>
          </div>
          <div class="caption">art</div>
        </div>

      </a>


      <!-- ───────────────────────────────────────
           NAV ITEM 2 — RESUME / WORK → work.html
      ─────────────────────────────────────────── -->
      <a id="work" class="item" href="work.html">

        <!-- Swap for: <img class="magnet" src="images/magnets/work.png" alt="magnet"> -->
        <div class="css-magnet"
             style="background: radial-gradient(circle at 35% 35%, #a0d4f5, #0077b6);"></div>

        <div class="polaroid">
          <!-- Swap for: <img class="preview" src="images/resume-card.png" alt="Work"> -->
          <div class="preview-placeholder">
            <span class="ph-icon">💼</span>
            <span>resume-card.png</span>
          </div>
          <div class="caption">resume / work</div>
        </div>

      </a>


      <!-- ───────────────────────────────────────
           NAV ITEM 3 — FOOD DIARY → food.html
      ─────────────────────────────────────────── -->
      <a id="food" class="item" href="food.html">

        <!-- Swap for: <img class="magnet" src="images/magnets/food.png" alt="magnet"> -->
        <div class="css-magnet"
             style="background: radial-gradient(circle at 35% 35%, #ffe599, #d4880a);"></div>

        <div class="polaroid">
          <!-- Swap for: <img class="preview" src="images/food-card.png" alt="Food"> -->
          <div class="preview-placeholder">
            <span class="ph-icon">🍜</span>
            <span>food-card.png</span>
          </div>
          <div class="caption">food diary</div>
        </div>

      </a>


      <!-- ───────────────────────────────────────
           DECORATIVE MAGNETS (not links)
           Swap each div for:
           <img id="d1" class="decor" src="images/magnets/decor1.png">
      ─────────────────────────────────────────── -->
      <div id="d1" class="decor-css"
           style="background: radial-gradient(circle at 35% 35%, #b5ead7, #2d8b6b); left:9%; top:12%;"></div>
      <div id="d2" class="decor-css"
           style="background: radial-gradient(circle at 35% 35%, #c9b1d9, #7b2d8b); right:12%; top:28%;"></div>
      <div id="d3" class="decor-css"
           style="background: radial-gradient(circle at 35% 35%, #ffd6a5, #c06020); left:18%; bottom:16%;"></div>

    </div><!-- /.fridge-wrap -->
  </div><!-- /#scene -->


  <script>
    const CORRECT_PASSWORD = "letmein"; // 👈 change this to your password

    function login() {
      if (document.getElementById("pw").value === CORRECT_PASSWORD) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("scene").style.display = "block";
      } else {
        document.getElementById("err").textContent = "Wrong password.";
      }
    }
  </script>

</body>
</html>
