<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fridge</title>

  <style>
    /* ---- GLOBAL RESET ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ---- PAGE BACKGROUND ---- */
    body {
      min-height: 100vh;
      background-image: url("images/DSC_7098.jpeg");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Times New Roman', Times, serif;
    }

    /* ---- PASSWORD SCREEN ---- */
    #login-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #login-box {
      background: #fdf0c8;
      border-radius: 8px;
      padding: 24px 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      text-align: center;
      border: 2px solid #5c3a1e;
      max-width: 320px;
      width: 90%;
      font-family: 'Times New Roman', Times, serif;
    }

    #login-box h2 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #3a2210;
    }

    #login-box p {
      font-size: 14px;
      margin-bottom: 14px;
      color: #5a3a20;
    }

    #login-box input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #b2966b;
    }

    #login-box button {
      padding: 8px 16px;
      font-size: 15px;
      border-radius: 4px;
      border: none;
      background: #5c3a1e;
      color: #fdf0c8;
      cursor: pointer;
    }

    #login-box button:hover {
      background: #7a4b27;
    }

    #login-error {
      margin-top: 8px;
      font-size: 14px;
      color: #b00020;
      min-height: 18px;
    }

    /* ---- FRIDGE ---- */
    .corkboard {
      position: relative;
      width: 65%;
      max-width: 860px;
      min-height: 860px;
      background-image: url("images/fridge.jpeg");
      background-size: 165%;
      background-position: center 15%;
      padding: 60px 40px 80px;
      margin: 0 auto;
    }

    /* ---- PINNED ITEMS ---- */
    .pinned-item {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: default;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    a.pinned-item {
      cursor: pointer;
      text-decoration: none;
    }

    a.pinned-item:hover {
      filter: brightness(1.08) drop-shadow(0 6px 18px rgba(0,0,0,0.45));
      transform: var(--rotate) scale(1.04) translateY(-4px) !important;
      z-index: 100 !important;
    }

    a.pinned-item .item-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    a.pinned-item:hover .item-img-wrap::after {
      opacity: 1;
    }

    .item-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item-img-wrap img.item-photo {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2px;
    }

    .placeholder-card {
      background: rgba(255,255,255,0.12);
      border: 2px dashed rgba(255,255,255,0.35);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255,255,255,0.75);
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }

    .placeholder-card .ph-icon {
      font-size: 26px;
      opacity: 0.6;
    }

    /* ---- MAGNET ---- */
    .magnet {
      width: 54px;
      height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, #d0d0d0 0%, #f4f4f4 50%, #b4b4b4 100%);
      border: 1px dashed rgba(0,0,0,0.18);
      margin-bottom: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.28);
      overflow: hidden;
      flex-shrink: 0;
    }

    .magnet img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---- TOOLTIP ---- */
    .tooltip {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 200;
    }

    a.pinned-item:hover .tooltip {
      opacity: 1;
    }

    /* ---- TAPE ---- */
    .tape {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 54px;
      height: 22px;
      background: rgba(255, 240, 150, 0.55);
      border-left: 1px solid rgba(200,180,80,0.3);
      border-right: 1px solid rgba(200,180,80,0.3);
      backdrop-filter: blur(1px);
      z-index: 10;
    }

    /* ---- STICKY NOTE ---- */
    .sticky {
      position: absolute;
      background: #f9e84a;
      padding: 14px 16px 10px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 18px;
      color: #2a2a2a;
      line-height: 1.4;
      box-shadow: 3px 4px 10px rgba(0,0,0,0.3);
      z-index: 5;
    }

    /* ---- PHOTO STRIP ---- */
    .photo-strip {
      position: absolute;
      background: white;
      padding: 6px 6px 22px;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.4);
    }

    .photo-strip .strip-inner {
      width: 110px;
      height: 90px;
      background: #c9bfb3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 11px;
      font-family: 'Times New Roman', Times, serif;
    }

    .photo-strip p {
      text-align: center;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    /* ---- DOODLES ---- */
    .doodle {
      position: absolute;
      font-size: 28px;
      opacity: 0.55;
      pointer-events: none;
      user-select: none;
    }

    /* hide fridge until password is correct */
    #corkboard-wrapper {
      width: 100%;
      display: none;
    }
  </style>
</head>
<body>

  <!-- PASSWORD OVERLAY -->
  <div id="login-screen">
    <div id="login-box">
      <h2>Fridge is Locked</h2>
      <p>Enter the password to view the fridge.</p>
      <input type="password" id="password-input" placeholder="Enter password" />
      <button type="button" onclick="checkPassword()">Submit</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- FRIDGE CONTENT -->
  <div id="corkboard-wrapper">
    <div class="corkboard">

      <!-- sticky note — left door -->
      <div class="sticky pinned-item" style="--rotate: rotate(2deg); transform: rotate(2deg); top: 55px; left: 18%; z-index: 4; width: 148px;">
        <div class="tape"></div>
        Escaping Allows You To Hear Yourself
      </div>

      <!-- sticky note — right door -->
      <div class="sticky pinned-item" style="--rotate: rotate(-4deg); transform: rotate(-4deg); top: 65px; right: 16%; width: 128px; background: #b8f0b0; z-index: 3; font-size: 15px;">
        <div class="tape" style="transform: translateX(-50%) rotate(5deg);"></div>
        updated weekly 🌿
      </div>

      <!-- photo strip — left door lower -->
      <div class="photo-strip" style="transform: rotate(-5deg); top: 490px; left: 18%; z-index: 2;">
        <div class="magnet" style="position:absolute; top:-14px; left:50%; transform:translateX(-50%); margin-bottom:0;"><img src="" alt="magnet"></div>
        <div class="strip-inner">[ photo ]</div>
        <p>summer '24</p>
      </div>

      <!-- doodles -->
      <div class="doodle" style="top: 85px; left: 46%; transform: rotate(15deg); font-size: 22px;">★</div>
      <div class="doodle" style="bottom: 110px; left: 35%; transform: rotate(-10deg);">✿</div>
      <div class="doodle" style="bottom: 70px; right: 25%; transform: rotate(8deg); font-size: 20px;">♡</div>
      <div class="doodle" style="top: 310px; left: 44%; font-size: 18px;">✦</div>

      <!-- NAV ITEM 1 — ART (left door) -->
      <a class="pinned-item" href="art.html"
         style="--rotate: rotate(-7deg); transform: rotate(-7deg); top: 170px; left: 19%; z-index: 6; width: 150px;">
        <div class="magnet"><img src="" alt="magnet"></div>
        <div class="item-img-wrap" style="width:150px; height:150px;">
          <img src="images/flowers.png" alt="Flowers" class="item-photo" style="display:block; max-width:100%; height:auto; border-radius:3px;">
        </div>
        <span class="tooltip">art</span>
      </a>

      <!-- NAV ITEM 2 — RESUME / WORK (right door) -->
      <a class="pinned-item" href="work.html"
         style="--rotate: rotate(5deg); transform: rotate(5deg); top: 155px; right: 17%; z-index: 7; width: 145px;">
        <div class="magnet"><img src="" alt="magnet"></div>
        <div class="item-img-wrap" style="width:145px; height:185px;">
          <div class="placeholder-card" style="width:145px; height:185px;">
            <span class="ph-icon">💼</span>
            <span>resume-card.png</span>
          </div>
        </div>
        <span class="tooltip">resume / work</span>
      </a>

      <!-- NAV ITEM 3 — FOOD DIARY (left door lower) -->
      <a class="pinned-item" href="food.html"
         style="--rotate: rotate(-3deg); transform: rotate(-3deg); top: 370px; left: 21%; z-index: 6; width: 145px;">
        <div class="magnet"><img src="" alt="magnet"></div>
        <div class="item-img-wrap">
          <img src="images/sweetpotato.png" alt="Sweet potato dish" class="item-photo" style="display:block; max-width:100%; height:auto; border-radius:3px;">
        </div>
        <span class="tooltip">food diary</span>
      </a>

      <!-- DECORATIVE PHOTO — right door mid -->
      <div class="pinned-item"
           style="--rotate: rotate(8deg); transform: rotate(8deg); top: 370px; right: 18%; z-index: 5; width: 135px;">
        <div class="magnet"><img src="" alt="magnet"></div>
        <div class="item-img-wrap" style="width:135px; height:135px;">
          <div class="placeholder-card" style="width:135px; height:135px;">
            <span class="ph-icon">📷</span>
            <span>your-photo.png</span>
          </div>
        </div>
      </div>

      <!-- DECORATIVE PHOTO 2 — right door lower -->
      <div class="pinned-item"
           style="--rotate: rotate(-6deg); transform: rotate(-6deg); top: 560px; right: 20%; z-index: 5; width: 125px;">
        <div class="magnet"><img src="" alt="magnet"></div>
        <div class="item-img-wrap" style="width:125px; height:125px;">
          <div class="placeholder-card" style="width:125px; height:125px;">
            <span class="ph-icon">📷</span>
            <span>your-photo.png</span>
          </div>
        </div>
      </div>

    </div><!-- /.corkboard -->
  </div><!-- /#corkboard-wrapper -->

  <script>
    // change this to whatever password you want
    const CORRECT_PASSWORD = "letmein";

    function checkPassword() {
      const entered = document.getElementById("password-input").value;
      const error = document.getElementById("login-error");

      if (entered === CORRECT_PASSWORD) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("corkboard-wrapper").style.display = "block";
      } else {
        error.textContent = "Wrong password.";
      }
    }
  </script>

</body>
</html>
