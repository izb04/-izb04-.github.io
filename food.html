<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Food Map</title>
  <link rel="stylesheet" href="style.css">

  <style>
   body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Times New Roman', Times, serif;
  background-image: url("images/DSC_7098.jpeg");  /* your background image */
  background-size: cover;                    /* fill the viewport */
  background-repeat: no-repeat;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

    /* Main map container */
    .map-container {
      position: relative;
      width: 900px;          /* adjust if you want wider/narrower */
      max-width: 95vw;
      /* key: give the container real height so it's not a slit */
      min-height: 400px;
      border: 4px solid #467ec7;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      background-color: #fff;
      overflow: hidden;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;          /* keep aspect ratio; don't force tiny height */
    }

    /* Clickable food dots */
    .map-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #ff6b3a;
      border: 2px solid #3c2a1a;
      box-shadow: 0 0 8px rgba(0,0,0,0.8);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .map-dot::after {
      content: attr(data-label);
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 2px 6px;
      font-size: 12px;
      color: #f9f3e6;
      background-color: rgba(0,0,0,0.7);
      border-radius: 4px;
      pointer-events: none;
    }

    .map-dot:hover {
      transform: scale(1.2);
      background-color: #ff9b6a;
      box-shadow: 0 0 14px rgba(0,0,0,0.9);
    }

    /* Top navigation bar */
    .top-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      background-color: rgba(0,0,0,0.7);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #3c2a1a;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .top-nav a {
      color: #f9f3e6;
      text-decoration: none;
      font-size: 14px;
    }

    .top-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="top-nav">
    <a href="index.html">Back to corkboard</a>
    <a href="art.html">Art</a>
    <a href="work.html">Resume / work</a>
  </div>

  <!-- Interactive food map -->
  <div class="map-container">
   <img src="images/map.png" alt="Food travel map" class="map-image">

    <!-- Barcelona food dot -->
    <a
      href="barcelona-food.html"
      class="map-dot"
      data-label="Barcelona – food"
      style="top: 60%; left: 44%;">
    </a>
  </div>

</body>
</html>
